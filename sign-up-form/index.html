<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/style.css">
  <title>Page Title</title>
</head>
<body>
  <div class="hero-image-holder">
    <img src="tree.jpeg" alt="image of leaves">
    <div class="logo-div">
      <div class="logo-holder">
        <img class="logo" src="logo.png" alt="logo">
      </div>
      <div class="logo-text">ODIN</div>
    </div>
    <div class="credit">Photo by Halie West on Unsplash</div>
  </div>
  
  <div class="hero-section">
 
    <div class="section1">
      <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up now to get started.</p>
      <p>You know you want to.</p>
    </div>
    
    <div class="section2">
      <h2>Let's do this!</h2>
      <form>
        <div>
          <label for="first-name">FIRST NAME</label>
          <input type="text" id="first-name" name="first-name">
          
          <label for="email">EMAIL</label>
          <input type="email" id="email" name="email">
          
          <label for="password">PASSWORD</label>
          <input type="password" id="password" name="password">
        </div>
        
        <div>
          <label for="last-name">LAST NAME</label>
          <input type="text" id="last-name" name="last-name">
          
          <label for="phone">PHONE NUMBER</label>
          <input type="tel" id="phone" name="phone">
          
          <label for="confirm-password">CONFIRM PASSWORD</label>
          <input type="password" id="confirm-password" name="confirm-password">
          
        </div>
      </form>
      
    </div>
    
    <div class="section3">
      <button id="submit-btn">Create Account</button>
      <p>Already have an account? <a class="login-link" href="https://www.example.com">Log in</a></p>
      
    </div>
        
  </div>
</body>
</html>
